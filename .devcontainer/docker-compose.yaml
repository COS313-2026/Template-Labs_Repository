version: '3.8'

services:
  app:
    image: node:20-slim
    volumes:
      - ..:/workspace:cached
    network_mode: service:db
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sports_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: LeaguePassword2026
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: